name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build desktop binaries ─────────────────────────────────────────────────
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pystray pillow

      - name: Generate icons
        run: python assets/create_icons.py

      - name: Build with PyInstaller
        run: pyinstaller app.spec

      # ── Linux: create .deb package ─────────────────────────────────────────
      - name: Package .deb (Linux)
        if: matrix.platform == 'linux'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="course-viewer_${TAG}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"

          cp dist/course-viewer "${PKG}/usr/bin/course-viewer"
          chmod +x "${PKG}/usr/bin/course-viewer"
          cp course-viewer.desktop "${PKG}/usr/share/applications/"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: course-viewer
          Version: ${TAG}
          Architecture: amd64
          Maintainer: patchamama <patchamama@github.com>
          Description: Local-first course companion — video player, proxy, notes
          EOF

          cat > "${PKG}/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          update-desktop-database /usr/share/applications || true
          EOF
          chmod +x "${PKG}/DEBIAN/postinst"

          dpkg-deb --build "${PKG}"
          echo "DEB_FILE=${PKG}.deb" >> "$GITHUB_ENV"
          # Also zip the raw binary
          zip "course-viewer_linux_amd64.zip" dist/course-viewer

      # ── macOS: create .dmg ─────────────────────────────────────────────────
      - name: Package .dmg (macOS)
        if: matrix.platform == 'macos'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # The spec creates "Course Viewer.app" in dist/
          APP_NAME="Course Viewer.app"
          DMG_NAME="course-viewer_${TAG}_macOS.dmg"
          hdiutil create -volname "Course Viewer" \
            -srcfolder "dist/${APP_NAME}" \
            -ov -format UDZO \
            "${DMG_NAME}"
          echo "DMG_FILE=${DMG_NAME}" >> "$GITHUB_ENV"

      # ── Windows: install NSIS then build installer ────────────────────────────
      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Package installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME -replace '^v', ''
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          $EXE_ABS = (Resolve-Path "dist\course-viewer.exe").Path
          & $makensis "/DEXE_PATH=$EXE_ABS" "/DVERSION=$TAG" nsis\installer.nsi
          Copy-Item dist\course-viewer.exe "course-viewer_${TAG}_windows_portable.exe"

      # ── Upload build artifacts ──────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            *.deb
            *.dmg
            *.zip
            *_setup.exe
            *_portable.exe

  # ── Create GitHub Release with all files ──────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**
            course-viewer.html
            proxy.py
            start.sh
            start.bat
            course-viewer.config.json.example
